<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HIGHSB — Coming Soon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    text-align:center;
    padding:20px;
  }
  .logo{
    font-size:32px;
    font-weight:900;
    letter-spacing:4px;
    color:#2ecc4a;
    text-transform:uppercase;
  }
  .beta{
    font-size:9px;font-weight:800;
    background:rgba(46,204,74,.15);
    border:1px solid rgba(46,204,74,.35);
    color:#2ecc4a;
    padding:2px 8px;border-radius:20px;
    letter-spacing:2px;vertical-align:middle;
    margin-left:6px;position:relative;top:-2px;
  }
  .gif{
    width:280px;
    border-radius:16px;
    border:2px solid rgba(46,204,74,.2);
    box-shadow:0 0 40px rgba(46,204,74,.1);
  }
  h1{
    font-size:28px;
    font-weight:900;
    letter-spacing:2px;
    text-transform:uppercase;
  }
  p{
    font-size:14px;
    color:#666;
    max-width:320px;
    line-height:1.7;
  }
  .dot{
    display:inline-block;
    width:6px;height:6px;
    background:#2ecc4a;
    border-radius:50%;
    margin:0 3px;
    animation:blink 1.4s infinite;
  }
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
  <div class="logo">HIGHSB <span class="beta">BETA</span></div>
  <img class="gif" src="https://media.tenor.com/XPRG-4ujVMIAAAAM/cat-work-in-progress.gif" alt="work in progress"/>
  <h1>Work in Progress</h1>
  <p>Suntem în lucru. Revino în curând pentru experience-ul complet.<span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
</body>
</html>
